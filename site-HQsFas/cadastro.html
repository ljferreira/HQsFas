<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/svg+xml" href="./assets/icon/favicon_hqs.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HQs Fãs</title>
        <link rel="stylesheet" href="./css/main.css"/>
        <link rel="stylesheet" href="./css/cadastro.css"/>
        <script src="./js/components/site-header.js" defer></script>
        <script src="./js/components/site-footer.js" defer></script>
        <script type="module" src="./js/cadastro.js" ></script>
    </head>
    <body>
        <site-header></site-header>
        <site-search></site-search>
        <main class=cadastro>
            <form action="" onsubmit="return false">
                <h2>CRIE SEU PERFIL DE FÃ</h2>
                <h5>JUNTE-SE À COMUNIDADE DE FÃS</h5>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required />
                <label for="email">Email:</label>
                <input type="email" id="email" required />
                <label for="senha">Senha</label>
                <input type="password" id="senha" required />
                <label for="cep">Cep:</label>
                <input type="text" id="cep" required />
                <div>
                    <div>
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" disabled />
                    </div>
                    <span>
                        <label for="estado">Estado:</label>
                        <input type="text" id="estado" disabled />
                    </span>
                </div>
                <button class="button-form" type="submit" id="btnConfirmarCadastro">Confirmar</button>
                <button class="button-form" type="button" onclick="window.location.assign('index.html')">Cancelar</button>
            </form>
        </main>
        <site-footer></site-footer>
    </body>   
</html>
